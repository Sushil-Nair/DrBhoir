name: Build and Deploy React App

on:
  push:
    branches:
      - main  # Change to 'master' if your default branch is named master

jobs:
  web-deploy:
    name: Deploy Website
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18 # Matches standard React environments
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build React App
      run: npm run build

    - name: Upload Files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: /public_html/
        protocol: ftps      # Forces secure connection required by Hostinger
        port: 21            # Matches Hostinger standard secure port
        timeout: 60000      # Extends connection limit to 60 seconds

